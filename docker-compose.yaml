name: choomai_bot

services:
  node_bot:
    container_name: choomai_bot
    image: ghcr.io/choomai/choomai-bot:latest
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - DB_HOST=mysql
      - DB_NAME=Discord
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - PORT=${PORT:-16969}
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_started
    restart: unless-stopped
    ports: 
      - "${PORT:-16969}:${PORT:-16969}"
    networks:
      - default
      - internal

  redis:
    container_name: choomai_redis
    image: redis:8-alpine
    user: redis
    command: redis-server
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      start_period: 3s
    restart: unless-stopped
    networks:
      - internal
  
  mysql:
    container_name: choomai_mysql
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: Discord
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - db:/var/lib/mysql
    restart: unless-stopped
    networks:
      - internal

volumes:
  db:

networks:
  default:
    driver: bridge
  internal:
    driver: bridge
    internal: true